name: TRMNL refresh

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Push markup to TRMNL
        run: |
          curl -sS --fail-with-body \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://sf-dashboard-puce.vercel.app/api/trmnl/cron
